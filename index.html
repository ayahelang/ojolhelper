<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ojol Helper</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="topbar">
        <div class="brand">
            <h1>Ojol Helper</h1>
            <p>Smart Target Area Planner</p>
        </div>
    </header>

    <main class="container">

        <section class="card">
            <h2>Input Operasional</h2>

            <div class="grid">
                <div>
                    <label>Pilih Pool</label>
                    <select id="pool">
                        <option value="cikeas">Blue Bird Pool Cikeas</option>
                        <option value="kranggan">Blue Bird Pool Kranggan</option>
                        <option value="cimanggis">Blue Bird Pool Cimanggis</option>
                        <option value="custom">Custom Lokasi</option>
                    </select>
                </div>

                <div>
                    <label>Custom Nama / Alamat</label>
                    <input type="text" id="customPool" placeholder="Contoh: Pool Tajurhalang">
                </div>

                <div>
                    <label>Konsumsi Kendaraan (km/l)</label>
                    <input type="number" id="kmpl" value="12">
                </div>

                <div>
                    <label>Harga BBM / Liter</label>
                    <input type="number" id="fuel" value="10000">
                </div>

                <div>
                    <label>Mode Operasi</label>
                    <select id="mode">
                        <option value="normal">Normal</option>
                        <option value="hemat">Hemat Bensin</option>
                        <option value="agresif">Agresif Cuan</option>
                    </select>
                </div>
            </div>

            <button onclick="generatePlan()">Generate Strategi</button>
        </section>


        <section class="stats">

            <div class="box">
                <span>Total Rotasi</span>
                <h3 id="kmTotal">0 km</h3>
            </div>

            <div class="box">
                <span>Kebutuhan BBM</span>
                <h3 id="fuelNeed">0 L</h3>
            </div>

            <div class="box">
                <span>Estimasi Biaya</span>
                <h3 id="fuelCost">Rp0</h3>
            </div>

        </section>


        <section class="card">
            <h2>Target Area Per Jam</h2>
            <div id="timeline"></div>
        </section>

    </main>

    <footer>
        <p>© 2026 Ojol Helper</p>
        <p class="powered">
            Powered by
            <a href="https://silverhawk.web.id" target="_blank">
                Silverhawk Network
            </a>
        </p>
    </footer>
    
    <button id="topBtn">↑</button>

    <script src="script.js"></script>
</body>

</html>
